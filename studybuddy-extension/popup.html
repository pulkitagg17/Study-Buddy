<!DOCTYPE html>
<html>

  <title>StudyBuddy</title>
  <link rel="stylesheet" href="styles.css">

      width: 300px;
      height: auto;
      background-color: var(--bg-color);

</head>

<body>

  <script src="popup.js"></script>

</html>
